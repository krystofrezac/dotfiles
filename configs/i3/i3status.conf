# i3status configuration file
# See "man i3status" for documentation

general {
  interval = 1
  colors = true
  color_good="#FFFFFF"
  color_degraded="#ffd75f"
  color_bad="#d75f5f"
}

order += "volume master"
order += "battery 0"
order += "disk /"
order += "cpu_usage"
order += "tztime local"

tztime local{
  format = "   %d. %m. %y %H:%M:%S "
}

disk "/"{
  format = "   %avail "
}

cpu_usage{
  format = "   %usage "
}

volume master{
  format = "   %volume "
  format_muted = " %volume"
  device = "default"
  mixer = "Master"
  mixer_idx = 0
}

battery 0 {
  format = " %status %percentage "
  format_down = "   "
  status_chr = "  "
  status_bat = " BATTERY "
  status_unk = " UNKNOWN "
  status_full = "   "
  path = "/sys/class/power_supply/BAT%d/uevent"
}
